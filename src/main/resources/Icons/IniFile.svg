<!-- ini.svg — Settings/Config icon (16x16) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">

    <!-- File background -->
    <rect x="1" y="1" width="14" height="14" rx="3" fill="#1E2329"/>

    <!-- Config lines -->
    <rect x="3" y="4" width="10" height="1.2" rx="0.6" fill="#A0A8B4" opacity="0.9"/>
    <rect x="3" y="7.4" width="10" height="1.2" rx="0.6" fill="#A0A8B4" opacity="0.85"/>
    <rect x="3" y="10.8" width="10" height="1.2" rx="0.6" fill="#A0A8B4" opacity="0.8"/>

    <!-- Slider knobs (settings feel) -->
    <circle cx="6" cy="4.6" r="1.3" fill="#3C99CC"/>
    <circle cx="10" cy="8.0" r="1.3" fill="#3BEA62"/>
    <circle cx="8" cy="11.4" r="1.3" fill="#6B57FF"/>

</svg>
